<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кто хочет стать миллионером</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app">
    <header class="header">
      <h1>Кто хочет стать миллионером</h1>
      <p class="subtitle">Ответьте на 3 вопроса и выиграйте 1 000 000 ₽</p>
    </header>

    <section class="layout">
      <aside class="money-ladder" aria-label="Таблица выигрышей">
        <h2>Несгораемая сумма</h2>
        <ol id="money-list"></ol>
      </aside>

      <section class="game-card">
        <div class="status-panel">
          <span id="status-text">Нажмите «Начать игру»</span>
          <button id="take-money-btn" class="secondary" disabled>Забрать деньги</button>
        </div>

        <div class="game-main">
          <div id="question-box" class="question-box">
            <p id="question-text">Готовы испытать удачу и выиграть миллион?</p>
          </div>
          <div id="answers" class="answers-grid"></div>
          <div id="final-screen" class="final-screen" aria-live="polite">
            <h1 class="final-screen-text" style="font-size: 90px;">Поздравляем вы выиграли миллион!!!</h1>
          </div>
        </div>

        <div class="hints">
          <button id="hint-5050" class="hint-btn">50:50</button>
          <button id="hint-audience" class="hint-btn">Помощь зала</button>
          <button id="hint-call" class="hint-btn">Звонок другу</button>
        </div>
        <button id="next-question-btn" class="secondary next-question-btn" type="button" hidden>Следующий вопрос</button>

        <div id="hint-result" class="hint-result" aria-live="polite"></div>
        <div id="setup-controls" class="setup-controls">
          <label for="question-pack" class="pack-label">Пакет</label>
          <select id="question-pack" class="pack-select" aria-label="Выбор пакета вопросов">
            <option value="pack1">Пакет 1</option>
            <option value="pack2">Пакет 2</option>
            <option value="pack3">Пакет 3</option>
            <option value="pack4">Пакет 4</option>
          </select>
          <button id="start-btn" class="primary setup-btn">Начать игру</button>
          <button id="ready-start-btn" class="ready-signal-btn setup-btn" type="button">Все готовы</button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
